<!DOCTYPE html>
<html>
<head>
<title>Callback Calculator</title>
</head>

<body>

<h2>Calculator</h2>

<input type="number" id="num1" placeholder="Number 1">
<input type="number" id="num2" placeholder="Number 2">

<br><br>

<button onclick="perform('+')">+</button>
<button onclick="perform('-')">-</button>
<button onclick="perform('*')">*</button>
<button onclick="perform('/')">/</button>

<h3 id="result"></h3>

<script>

const add = (a,b) => a+b;
const subtract = (a,b) => a-b;
const multiply = (a,b) => a*b;

function divide(a,b){
if(b==0){
return "Cannot divide by zero";
}
return a/b;
}

function calculate(num1,num2,operationCallback){
return operationCallback(num1,num2);
}

function perform(op){

let n1 = parseFloat(document.getElementById("num1").value);
let n2 = parseFloat(document.getElementById("num2").value);

let result;

switch(op){

case "+":
result = calculate(n1,n2,add);
break;

case "-":
result = calculate(n1,n2,subtract);
break;

case "*":
result = calculate(n1,n2,multiply);
break;

case "/":
result = calculate(n1,n2,divide);
break;

}

document.getElementById("result").innerText="Result: "+result;

}

</script>

</body>
</html>
