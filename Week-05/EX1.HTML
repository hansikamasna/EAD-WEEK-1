<!DOCTYPE html>
<html>
<head>
<title>Smart Login Page</title>

<style>
body{
font-family: Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f2f2f2;
}

.container{
background:white;
padding:25px;
border-radius:8px;
width:300px;
box-shadow:0 0 10px gray;
}

input{
width:100%;
padding:10px;
margin:8px 0;
}

button{
width:100%;
padding:10px;
background:blue;
color:white;
border:none;
cursor:pointer;
}

.error{
color:red;
font-size:14px;
}

@media(max-width:600px){
.container{
width:90%;
}
}
</style>

</head>

<body>

<div class="container">
<h2>Login</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button id="loginBtn">Login</button>

<p id="message" class="error"></p>
</div>

<script>

function loginTracker(){
let attempts = 0;

return function(){
attempts++;
return attempts;
}
}

let track = loginTracker();

document.getElementById("loginBtn").addEventListener("click",function(){

let user = document.getElementById("username").value;
let pass = document.getElementById("password").value;
let msg = document.getElementById("message");

if(user === ""){
msg.innerText="Username cannot be empty";
return;
}

if(pass.length < 6){
msg.innerText="Password must be at least 6 characters";
return;
}

let attempts = track();

if(user === "admin" && pass === "123456"){
msg.style.color="green";
msg.innerText="Login Successful!";
}
else{

if(attempts >=3){
msg.innerText="Too many attempts! Login disabled.";
document.getElementById("loginBtn").disabled=true;
}
else{
msg.innerText="Invalid credentials. Attempts left: "+(3-attempts);
}

}

});

</script>

</body>
</html>
