<!DOCTYPE html>
<html>
<head>
<title>Employee Payroll</title>
</head>

<body>

<h2>Employee Salary Calculator</h2>

<input type="text" id="name" placeholder="Employee Name">
<input type="number" id="salary" placeholder="Basic Salary">

<button onclick="calculate()">Calculate Salary</button>

<div id="output"></div>

<script>

function Employee(name,basicSalary,hra=2000,ta=1000){

this.name = name;
this.basicSalary = basicSalary;
this.hra = hra;
this.ta = ta;

this.calculateNetSalary = function(){

let gross = this.basicSalary + this.hra + this.ta;

let tax = gross * 0.10;

let net = gross - tax;

return {gross,tax,net};

}

}

function calculate(){

let name = document.getElementById("name").value;
let salary = parseFloat(document.getElementById("salary").value);

let emp = new Employee(name,salary);

let result = emp.calculateNetSalary();

let output = `
Name: ${name}<br>
Gross Salary: ${result.gross}<br>
Tax (10%): ${result.tax}<br>
Net Salary: ${result.net}
`;

document.getElementById("output").innerHTML = output;

}

</script>

</body>
</html>
