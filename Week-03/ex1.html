<!DOCTYPE html>
<html>
<head>
<title>Student Registration</title>
<link rel="stylesheet" href="ex1.css">
</head>

<body>

<form class="form-box">
<h2>Student Registration</h2>

<label>Name:</label>
<input type="text">

<label>Email:</label>
<input type="email">

<label>Gender:</label>
<select>
<option>Male</option>
<option>Female</option>
</select>

<label>Course:</label>
<select>
<option>B.Tech</option>
<option>B.Sc</option>
<option>BCA</option>
</select>

<button type="submit">Submit</button>

</form>

</body>
</html>
